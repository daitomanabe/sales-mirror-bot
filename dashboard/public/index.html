<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Mirror Bot — Dashboard</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #8888a0;
      --accent: #6c5ce7;
      --accent2: #a29bfe;
      --green: #00b894;
      --orange: #fdcb6e;
      --red: #e17055;
      --blue: #74b9ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--accent2); }
    .status-badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .status-badge.online { border-color: var(--green); color: var(--green); }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
    }
    .stat-card .value.money { color: var(--green); }
    .stat-card .value.active { color: var(--accent2); }

    /* Stage Funnel */
    .section { margin-bottom: 32px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .funnel {
      display: flex;
      gap: 4px;
      align-items: end;
      height: 120px;
    }
    .funnel-bar {
      flex: 1;
      background: var(--accent);
      border-radius: 6px 6px 0 0;
      min-height: 8px;
      position: relative;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .funnel-bar:hover { opacity: 0.8; }
    .funnel-bar .bar-label {
      position: absolute;
      bottom: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .funnel-bar .bar-count {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 600;
    }

    /* Conversations Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    .stage-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .stage-initial_response { background: #6c5ce720; color: var(--accent2); }
    .stage-meeting_setup { background: #74b9ff20; color: var(--blue); }
    .stage-proposal { background: #fdcb6e20; color: var(--orange); }
    .stage-negotiation { background: #e1705520; color: var(--red); }
    .stage-contract { background: #00b89420; color: var(--green); }
    .stage-implementation { background: #00b89440; color: var(--green); }
    .stage-billing { background: #00b89460; color: #00d2a0; }
    .stage-closed { background: #88888820; color: var(--text-dim); }
    .stage-dead { background: #e1705510; color: #e17055aa; }

    .budget { font-variant-numeric: tabular-nums; }

    /* Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 800px;
      max-height: 80vh;
      overflow-y: auto;
      padding: 24px;
    }
    .modal h2 { margin-bottom: 16px; font-size: 18px; }
    .modal .close-btn {
      float: right;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
    }
    .message-thread { margin-top: 16px; }
    .message {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.inbound {
      background: var(--surface2);
      border-left: 3px solid var(--blue);
    }
    .message.outbound {
      background: var(--surface2);
      border-left: 3px solid var(--green);
    }
    .message .meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    /* Activity Feed */
    .activity-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }
    .activity-dot.inbound { background: var(--blue); }
    .activity-dot.outbound { background: var(--green); }
    .activity-time { color: var(--text-dim); font-size: 11px; }

    /* Responsive */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .funnel { height: 80px; }
    }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-dim);
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }
    .loading { opacity: 0.5; }
  </style>
</head>
<body>
  <header>
    <h1><span>Mirror</span>Bot Dashboard</h1>
    <div class="status-badge" id="statusBadge">Loading...</div>
  </header>

  <div class="container">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label">Total Conversations</div>
        <div class="value" id="statTotal">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Active</div>
        <div class="value active" id="statActive">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Messages</div>
        <div class="value" id="statMessages">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Pipeline Value</div>
        <div class="value money" id="statPipeline">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Documents</div>
        <div class="value" id="statDocs">-</div>
      </div>
    </div>

    <!-- Stage Funnel -->
    <div class="section">
      <div class="section-title">Conversation Funnel</div>
      <div class="funnel" id="funnelChart" style="margin-bottom: 32px;"></div>
    </div>

    <!-- Recent Activity -->
    <div class="section">
      <div class="section-title">Recent Activity</div>
      <div class="table-wrap" style="padding: 16px;" id="activityFeed">
        <div class="empty-state"><p>No activity yet</p></div>
      </div>
    </div>

    <!-- Conversations Table -->
    <div class="section">
      <div class="section-title">All Conversations</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Company</th>
              <th>Contact</th>
              <th>Stage</th>
              <th>Budget</th>
              <th>Platform</th>
              <th>Updated</th>
            </tr>
          </thead>
          <tbody id="convsTable">
            <tr><td colspan="6" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <button class="close-btn" onclick="closeModal()">&times;</button>
      <h2 id="modalTitle">Conversation</h2>
      <div id="modalContent"></div>
    </div>
  </div>

  <script>
    const API = '/api';
    const STAGE_LABELS = {
      initial_response: '初回返信',
      meeting_setup: '打合せ',
      proposal: '提案',
      negotiation: '交渉',
      contract: '契約',
      implementation: '実装',
      billing: '請求',
      closed: '完了',
      dead: '終了',
    };
    const STAGE_ORDER = [
      'initial_response', 'meeting_setup', 'proposal', 'negotiation',
      'contract', 'implementation', 'billing', 'closed', 'dead'
    ];

    function formatMoney(v) {
      if (!v) return '-';
      return '¥' + Number(v).toLocaleString();
    }

    function formatDate(d) {
      if (!d) return '-';
      return new Date(d).toLocaleString('ja-JP', {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function timeAgo(d) {
      if (!d) return '';
      const diff = Date.now() - new Date(d).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h ago`;
      return `${Math.floor(hours / 24)}d ago`;
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API}/stats`);
        const data = await res.json();

        document.getElementById('statTotal').textContent = data.total_conversations;
        document.getElementById('statActive').textContent = data.active_conversations;
        document.getElementById('statMessages').textContent = data.total_messages;
        document.getElementById('statPipeline').textContent = formatMoney(data.pipeline_value);
        document.getElementById('statDocs').textContent = data.total_documents;

        // Funnel
        const funnelEl = document.getElementById('funnelChart');
        const stageCounts = {};
        (data.by_stage || []).forEach(s => stageCounts[s.stage] = s.count);
        const maxCount = Math.max(1, ...Object.values(stageCounts));

        funnelEl.innerHTML = STAGE_ORDER.map(stage => {
          const count = stageCounts[stage] || 0;
          const height = Math.max(8, (count / maxCount) * 100);
          return `
            <div class="funnel-bar stage-${stage}"
                 style="height: ${height}%"
                 onclick="filterByStage('${stage}')">
              <span class="bar-count">${count}</span>
              <span class="bar-label">${STAGE_LABELS[stage]}</span>
            </div>`;
        }).join('');

        // Activity Feed
        const feedEl = document.getElementById('activityFeed');
        if (data.recent_activity?.length) {
          feedEl.innerHTML = data.recent_activity.map(a => `
            <div class="activity-item">
              <div class="activity-dot ${a.direction}"></div>
              <div>
                <strong>${a.company_name}</strong>
                <span class="stage-badge stage-${a.stage}">${STAGE_LABELS[a.stage]}</span>
                <br>
                <span>${a.subject || '(no subject)'}</span>
                <span class="activity-time">${timeAgo(a.sent_at)}</span>
              </div>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Failed to load stats', e);
      }
    }

    async function loadConversations(stage) {
      try {
        const url = stage
          ? `${API}/conversations?stage=${stage}`
          : `${API}/conversations`;
        const res = await fetch(url);
        const data = await res.json();

        const tbody = document.getElementById('convsTable');
        if (!data.conversations?.length) {
          tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No conversations yet. Start the bot and wait for sales emails.</td></tr>';
          return;
        }

        tbody.innerHTML = data.conversations.map(c => {
          const info = c.extracted_info || {};
          return `
            <tr onclick="showDetail(${c.id})" style="cursor:pointer">
              <td><strong>${c.company_name || '-'}</strong></td>
              <td>${info.contact_name || '-'}</td>
              <td><span class="stage-badge stage-${c.stage}">${STAGE_LABELS[c.stage] || c.stage}</span></td>
              <td class="budget">${formatMoney(info.budget_low)}${info.budget_high ? ' ~ ' + formatMoney(info.budget_high) : ''}</td>
              <td>${info.platform || '-'}</td>
              <td>${formatDate(c.updated_at)}</td>
            </tr>`;
        }).join('');
      } catch (e) {
        console.error('Failed to load conversations', e);
      }
    }

    async function showDetail(id) {
      try {
        const res = await fetch(`${API}/conversations/${id}`);
        const data = await res.json();
        const c = data.conversation;
        const info = c.extracted_info || {};

        document.getElementById('modalTitle').textContent =
          `${c.company_name} — ${STAGE_LABELS[c.stage]}`;

        let html = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;font-size:13px;">
            <div><strong>Contact:</strong> ${info.contact_name}</div>
            <div><strong>Email:</strong> ${c.email_from}</div>
            <div><strong>Budget:</strong> ${formatMoney(info.budget_low)} ~ ${formatMoney(info.budget_high)}</div>
            <div><strong>Platform:</strong> ${info.platform || '-'}</div>
            <div><strong>Service:</strong> ${info.service_type || '-'}</div>
            <div><strong>Created:</strong> ${formatDate(c.created_at)}</div>
          </div>
        `;

        if (data.messages?.length) {
          html += '<div class="section-title">Message Thread</div>';
          html += '<div class="message-thread">';
          html += data.messages.map(m => `
            <div class="message ${m.direction}">
              <div class="meta">
                ${m.direction === 'inbound' ? '← Inbound' : '→ Outbound'}
                &middot; ${formatDate(m.sent_at)}
                ${m.subject ? ` &middot; ${m.subject}` : ''}
              </div>
              ${m.body}
            </div>
          `).join('');
          html += '</div>';
        }

        if (data.documents?.length) {
          html += '<div class="section-title" style="margin-top:16px">Documents</div>';
          html += data.documents.map(d => `
            <div class="message outbound">
              <div class="meta">${d.doc_type} &middot; ${formatDate(d.created_at)}</div>
              ${d.content.substring(0, 500)}${d.content.length > 500 ? '...' : ''}
            </div>
          `).join('');
        }

        document.getElementById('modalContent').innerHTML = html;
        document.getElementById('modalOverlay').classList.add('active');
      } catch (e) {
        console.error('Failed to load detail', e);
      }
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('active');
    }

    function filterByStage(stage) {
      loadConversations(stage);
    }

    // Check health
    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        const badge = document.getElementById('statusBadge');
        badge.textContent = data.last_sync
          ? `Last sync: ${timeAgo(data.last_sync.synced_at)}`
          : 'No data synced yet';
        badge.classList.add('online');
      } catch {
        document.getElementById('statusBadge').textContent = 'Offline';
      }
    }

    // Init
    checkHealth();
    loadStats();
    loadConversations();

    // Auto-refresh every 30s
    setInterval(() => {
      checkHealth();
      loadStats();
      loadConversations();
    }, 30000);

    // Close modal on overlay click
    document.getElementById('modalOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
  </script>
</body>
</html>

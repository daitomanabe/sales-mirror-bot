name = "sales-mirror-dashboard"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[assets]
directory = "./public"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mirror-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace after: wrangler d1 create mirror-db

[vars]
DASHBOARD_TITLE = "Sales Mirror Bot Dashboard"
# Set API_TOKEN via: wrangler secret put API_TOKEN
